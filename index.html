<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FAF8F5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="스케쥴">
<title>스케쥴</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&family=Noto+Serif+KR:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #FAF8F5;
    --bg-elevated: #FFFFFF;
    --ink: #2A2724;
    --ink-soft: #6B6560;
    --ink-faint: #A8A19A;
    --line: #E8E2DA;
    --line-soft: #F0EBE3;
    --accent: #3B2F4A;
    --accent-soft: #5A4A6E;
    --danger: #8B3A3A;
    --name-bg: #EDE6D9;
    --name-ink: #6B5B3E;

    --serif: 'Cormorant Garamond', 'Noto Serif KR', serif;
    --sans: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;

    --radius: 6px;
    --radius-lg: 10px;
    --shadow-sm: 0 1px 2px rgba(42, 39, 36, 0.04);
    --shadow-md: 0 4px 16px rgba(42, 39, 36, 0.08);
    --shadow-lg: 0 12px 40px rgba(42, 39, 36, 0.12);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--ink);
    font-family: var(--sans); font-size: 16px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
  }

  button {
    font-family: inherit; font-size: inherit; color: inherit;
    background: none; border: none; cursor: pointer; padding: 0;
  }

  input { font-family: inherit; font-size: inherit; color: inherit; }

  /* ============================================
     LOGIN / SIGNUP
     ============================================ */
  #login-screen, #signup-screen {
    min-height: 100vh; min-height: 100dvh;
    display: none;
    align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(ellipse at top, rgba(59, 47, 74, 0.04) 0%, transparent 60%),
      var(--bg);
  }
  #login-screen.visible, #signup-screen.visible { display: flex; }

  .login-card { width: 100%; max-width: 380px; text-align: center; }

  .login-mark {
    font-family: var(--serif); font-size: 14px;
    letter-spacing: 0.4em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 28px;
  }

  .login-title {
    font-family: var(--serif); font-size: 64px; font-weight: 500;
    line-height: 1; margin: 0 0 12px; color: var(--ink);
    letter-spacing: -0.01em;
  }

  .login-subtitle {
    font-family: var(--serif); font-style: italic; font-size: 18px;
    color: var(--ink-soft); margin-bottom: 56px;
  }

  #signup-screen .login-title { font-size: 56px; }
  #signup-screen .login-subtitle { margin-bottom: 40px; }

  .login-divider {
    display: flex; align-items: center; gap: 16px;
    margin: 0 auto 40px; width: 60%;
  }
  .login-divider::before, .login-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--line);
  }
  .login-divider span {
    font-family: var(--serif); font-style: italic;
    color: var(--ink-faint); font-size: 14px;
  }

  .login-form { display: flex; flex-direction: column; gap: 16px; }

  .login-form input {
    width: 100%; padding: 16px 18px;
    background: var(--bg-elevated);
    border: 1px solid var(--line); border-radius: var(--radius);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .login-form input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59, 47, 74, 0.08);
  }
  .login-form input::placeholder { color: var(--ink-faint); }

  .login-button {
    width: 100%; padding: 16px;
    background: var(--accent); color: #FFFFFF;
    border-radius: var(--radius);
    font-weight: 500; letter-spacing: 0.05em;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
  }
  .login-button:hover { background: var(--accent-soft); }
  .login-button:active { transform: scale(0.98); }

  .login-error {
    color: var(--danger); font-size: 14px;
    margin-top: 12px; min-height: 20px;
  }

  .login-footer {
    margin-top: 32px; font-size: 13px; color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .link-btn {
    color: var(--accent); font-size: 13px; font-weight: 500;
    padding: 4px 8px; border-radius: 4px; transition: background 0.2s;
  }
  .link-btn:hover { background: rgba(59, 47, 74, 0.06); }

  /* ============================================
     APP
     ============================================ */
  #app-screen {
    display: none; min-height: 100vh; min-height: 100dvh;
    flex-direction: column;
  }
  #app-screen.visible { display: flex; }

  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-elevated);
    position: sticky; top: 0; z-index: 10;
  }

  .header-brand {
    font-family: var(--serif); font-size: 22px; font-weight: 500;
    letter-spacing: 0.02em; color: var(--ink);
  }

  .header-right {
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; color: var(--ink-soft);
  }

  .header-user { font-family: var(--serif); font-style: italic; }
  .header-user.is-admin::after {
    content: ' · 관리자'; color: var(--accent); font-style: normal;
  }

  .logout-btn {
    color: var(--ink-faint); font-size: 13px;
    padding: 6px 10px; border-radius: var(--radius);
    transition: color 0.2s, background 0.2s;
  }
  .logout-btn:hover { color: var(--ink); background: var(--line-soft); }

  /* ============================================
     SCHEDULE TABLE
     ============================================ */
  .page-title-wrap {
    padding: 32px 24px 20px;
    text-align: center;
    border-bottom: 1px solid var(--line-soft);
  }
  .page-title {
    font-family: var(--serif); font-size: 34px; font-weight: 500;
    margin: 0; letter-spacing: 0.01em;
  }
  .page-subtitle {
    font-family: var(--serif); font-style: italic;
    color: var(--ink-soft); font-size: 15px; margin-top: 4px;
  }

  .table-wrap {
    flex: 1; overflow-y: auto;
    padding: 24px 16px 100px;
    max-width: 720px; width: 100%; margin: 0 auto;
  }

  .loading-row {
    text-align: center; padding: 60px 20px;
    color: var(--ink-faint);
    font-family: var(--serif); font-style: italic;
  }

  .schedule-table {
    width: 100%;
    border-collapse: separate; border-spacing: 0;
    background: var(--bg-elevated);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--line);
  }

  .schedule-table thead th {
    background: var(--line-soft);
    font-family: var(--serif); font-weight: 500; font-size: 13px;
    color: var(--ink-soft); text-align: left;
    padding: 14px 18px;
    letter-spacing: 0.08em; text-transform: uppercase;
    border-bottom: 1px solid var(--line);
  }
  .schedule-table thead th:first-child { width: 42%; }

  .schedule-table tbody tr {
    border-bottom: 1px solid var(--line-soft);
  }
  .schedule-table tbody tr:last-child td { border-bottom: none; }
  .schedule-table tbody td {
    border-bottom: 1px solid var(--line-soft);
  }

  .schedule-table td {
    padding: 16px 18px;
    vertical-align: top;
  }

  .date-cell {
    font-family: var(--serif); font-size: 21px;
    color: var(--ink); font-weight: 500;
    white-space: nowrap;
    border-right: 1px solid var(--line-soft);
    position: relative;
  }
  .date-cell .date-input {
    width: 100%;
    font: inherit; color: inherit;
    background: transparent; border: none; padding: 0;
    border-bottom: 1px dashed var(--ink-faint);
  }
  .date-cell .date-input:focus {
    outline: none; border-bottom-color: var(--accent);
  }
  .date-cell .date-input::placeholder {
    color: var(--ink-faint); font-style: italic; font-size: 16px;
  }

  .row-delete {
    position: absolute;
    right: 6px; top: 50%;
    transform: translateY(-50%);
    width: 28px; height: 28px;
    border-radius: 50%;
    color: var(--ink-faint);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, background 0.15s;
  }
  .date-cell:hover .row-delete { opacity: 1; }
  .row-delete:hover { color: var(--danger); background: var(--line-soft); }

  .names-cell { min-height: 48px; }
  .names-list {
    display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center; min-height: 32px;
  }

  .name-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 13px;
    background: var(--name-bg); color: var(--name-ink);
    border-radius: 999px;
    font-size: 14px; font-weight: 500;
    cursor: default;
    transition: transform 0.15s, box-shadow 0.15s;
    max-width: 100%;
  }
  .name-chip.clickable { cursor: pointer; }
  .name-chip.clickable:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }

  .add-name-btn {
    padding: 6px 14px;
    border: 1px dashed var(--line);
    border-radius: 999px;
    font-size: 13px;
    color: var(--ink-soft);
    transition: all 0.2s;
  }
  .add-name-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    border-style: solid;
  }

  .add-row-btn {
    display: block;
    margin: 20px auto 0;
    padding: 12px 28px;
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    font-size: 14px;
    color: var(--ink-soft);
    background: transparent;
    transition: all 0.2s;
  }
  .add-row-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    border-style: solid;
  }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--ink-faint);
    font-family: var(--serif); font-style: italic;
    font-size: 17px;
  }

  /* ============================================
     MODAL
     ============================================ */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(42, 39, 36, 0.35);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center; justify-content: center;
    padding: 20px; z-index: 100;
    animation: fadeIn 0.2s ease;
  }
  .modal-backdrop.visible { display: flex; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal {
    background: var(--bg-elevated);
    border-radius: var(--radius-lg);
    width: 100%; max-width: 400px;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.25s ease;
    overflow: hidden;
  }

  .modal-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--line-soft);
  }
  .modal-title {
    font-family: var(--serif); font-size: 26px; font-weight: 500;
    margin: 0; line-height: 1.2;
  }
  .modal-subtitle {
    font-family: var(--serif); font-style: italic;
    font-size: 14px; color: var(--ink-soft);
    margin-top: 4px;
  }

  .modal-body { padding: 20px 24px; }

  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block; font-size: 12px;
    color: var(--ink-soft); margin-bottom: 6px;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .field input {
    width: 100%; padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--bg-elevated);
    transition: border-color 0.2s;
  }
  .field input:focus {
    outline: none; border-color: var(--accent);
  }
  .field .hint {
    font-size: 12px; color: var(--ink-faint);
    margin-top: 6px; font-style: italic;
  }

  .modal-footer {
    padding: 16px 24px 24px;
    display: flex; gap: 10px; justify-content: flex-end;
  }

  .btn {
    padding: 11px 20px;
    border-radius: var(--radius);
    font-size: 14px; font-weight: 500;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #FFFFFF; }
  .btn-primary:hover { background: var(--accent-soft); }
  .btn-secondary {
    background: var(--bg); color: var(--ink-soft);
    border: 1px solid var(--line);
  }
  .btn-secondary:hover { color: var(--ink); border-color: var(--ink-soft); }
  .btn-danger {
    background: transparent; color: var(--danger);
    border: 1px solid var(--danger);
    margin-right: auto;
  }
  .btn-danger:hover { background: var(--danger); color: #FFFFFF; }

  .modal-error {
    background: #FBF1F1; color: var(--danger);
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
  }
  .modal-error.visible { display: block; }

  /* ============================================
     TOAST
     ============================================ */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink); color: var(--bg);
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 14px;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 200;
    pointer-events: none;
  }
  .toast.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ============================================
     RESPONSIVE
     ============================================ */
  @media (max-width: 767px) {
    .header-brand { font-size: 19px; }
    .login-title { font-size: 52px; }
    .page-title-wrap { padding: 24px 16px 16px; }
    .page-title { font-size: 28px; }
    .page-subtitle { font-size: 14px; }
    .table-wrap { padding: 16px 10px 100px; }
    .schedule-table thead th {
      padding: 11px 12px; font-size: 11px;
    }
    .schedule-table td { padding: 13px 12px; }
    .date-cell { font-size: 17px; }
    .schedule-table thead th:first-child { width: 44%; }
    .name-chip { font-size: 13px; padding: 6px 11px; }
    .add-name-btn { font-size: 12px; padding: 6px 12px; }
    .row-delete { opacity: 1; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <h1 class="login-title">스케쥴</h1>
    <p class="login-subtitle">Schedule</p>
    <div class="login-divider"><span>로그인</span></div>
    <form class="login-form" id="login-form" autocomplete="off">
      <input type="text" id="login-id" placeholder="아이디" autocomplete="off">
      <input type="password" id="login-pw" placeholder="비밀번호" autocomplete="off">
      <button type="submit" class="login-button">입장</button>
      <div class="login-error" id="login-error"></div>
    </form>
    <div class="login-footer">
      <span>아직 계정이 없으신가요?</span>
      <button type="button" class="link-btn" id="goto-signup">회원가입</button>
    </div>
  </div>
</div>

<!-- SIGNUP SCREEN -->
<div id="signup-screen">
  <div class="login-card">
    <h1 class="login-title">스케쥴</h1>
    <p class="login-subtitle">회원가입</p>
    <div class="login-divider"><span>Sign up</span></div>
    <form class="login-form" id="signup-form" autocomplete="off">
      <input type="text"  id="signup-name"  placeholder="이름" autocomplete="off">
      <input type="email" id="signup-email" placeholder="이메일" autocomplete="off">
      <input type="tel"   id="signup-phone" placeholder="휴대전화" autocomplete="off">
      <input type="text"  id="signup-id"    placeholder="아이디" autocomplete="off">
      <input type="password" id="signup-pw"  placeholder="비밀번호 (8자 이상)" autocomplete="off">
      <input type="password" id="signup-pw2" placeholder="비밀번호 확인" autocomplete="off">
      <button type="submit" class="login-button">가입하기</button>
      <div class="login-error" id="signup-error"></div>
    </form>
    <div class="login-footer">
      <span>이미 계정이 있으신가요?</span>
      <button type="button" class="link-btn" id="goto-login">로그인</button>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <header class="app-header">
    <div class="header-brand">스케쥴</div>
    <div class="header-right">
      <span class="header-user" id="header-user"></span>
      <button class="logout-btn" id="pw-change-btn" style="display:none">비밀번호 변경</button>
      <button class="logout-btn" id="logout-btn">로그아웃</button>
    </div>
  </header>

  <div class="page-title-wrap">
    <h1 class="page-title">스케쥴</h1>
  </div>

  <div class="table-wrap" id="table-wrap">
    <div class="loading-row">불러오는 중…</div>
  </div>
</div>

<!-- ADD NAME MODAL -->
<div class="modal-backdrop" id="name-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">이름 추가</h2>
      <p class="modal-subtitle" id="name-modal-date">—</p>
    </div>
    <div class="modal-body">
      <div class="modal-error" id="name-error"></div>
      <div class="field">
        <label for="name-input">이름 (선택: 메모)</label>
        <input type="text" id="name-input" placeholder="예: 김지은 또는 김지은 (변경 가능성 있음)">
        <div class="hint">이름 뒤에 간단한 메모를 함께 적을 수 있습니다.</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="name-cancel">취소</button>
      <button class="btn btn-primary" id="name-save">저장</button>
    </div>
  </div>
</div>

<!-- CHIP ACTION MODAL -->
<div class="modal-backdrop" id="chip-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="chip-modal-name">—</h2>
      <p class="modal-subtitle" id="chip-modal-date">—</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="chip-delete">삭제</button>
      <button class="btn btn-secondary" id="chip-close">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- PASSWORD CHANGE MODAL -->
<div class="modal-backdrop" id="pw-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">비밀번호 변경</h2>
      <p class="modal-subtitle">Change password</p>
    </div>
    <div class="modal-body">
      <div class="modal-error" id="pw-error"></div>
      <div class="field">
        <label for="pw-current">현재 비밀번호</label>
        <input type="password" id="pw-current" autocomplete="off">
      </div>
      <div class="field">
        <label for="pw-new">새 비밀번호 (8자 이상)</label>
        <input type="password" id="pw-new" autocomplete="off">
      </div>
      <div class="field">
        <label for="pw-new2">새 비밀번호 확인</label>
        <input type="password" id="pw-new2" autocomplete="off">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="pw-cancel">취소</button>
      <button class="btn btn-primary" id="pw-save">변경</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getFirestore, collection, query, onSnapshot,
  Timestamp, doc, deleteDoc, addDoc, updateDoc, setDoc, getDoc

// ============================================

  authDomain: "studio-seton.firebaseapp.com",

// ============================================
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const state = {
  user: null,
  rows: [],
  unsubscribe: null,
};

// ---------- DOM ----------
const $ = (id) => document.getElementById(id);
const loginScreen  = $("login-screen");
const signupScreen = $("signup-screen");
const appScreen    = $("app-screen");
const tableWrap    = $("table-wrap");
const headerUser   = $("header-user");

function showLogin() {
  loginScreen.classList.add("visible");
  signupScreen.classList.remove("visible");
  appScreen.classList.remove("visible");
}
function showSignup() {
  loginScreen.classList.remove("visible");
  signupScreen.classList.add("visible");
  appScreen.classList.remove("visible");
}
function showApp() {
  loginScreen.classList.remove("visible");
  signupScreen.classList.remove("visible");

function showToast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("visible");
  setTimeout(() => t.classList.remove("visible"), 2400);
}

// ============================================
// DATE NORMALIZATION
// ============================================
// Accepts "5/1", "05/01", "2026/5/1", "2026-5-1", "2026.5.1", "26/5/1"
// Returns "YYYY/MM/DD" or null
function normalizeDate(input) {
  if (!input) return null;
  const s = String(input).trim();
  if (!s) return null;
  const cleaned = s.replace(/[-.]/g, "/").replace(/\s+/g, "");
  const parts = cleaned.split("/").filter(Boolean);

  let y, m, d;
  if (parts.length === 2) {
    y = new Date().getFullYear();
    m = parseInt(parts[0], 10);
    d = parseInt(parts[1], 10);
  } else if (parts.length === 3) {
    y = parseInt(parts[0], 10);
    m = parseInt(parts[1], 10);
    d = parseInt(parts[2], 10);
    if (y < 100) y += 2000;
  } else {
    return null;
  }

  if (!Number.isFinite(y) || !Number.isFinite(m) || !Number.isFinite(d)) return null;
  if (m < 1 || m > 12 || d < 1 || d > 31) return null;

  const pad = n => String(n).padStart(2, "0");
  return `${y}/${pad(m)}/${pad(d)}`;
}

function dateSortKey(dateText) {
  const norm = normalizeDate(dateText);
  if (!norm) return Number.MAX_SAFE_INTEGER;
  const [y, m, d] = norm.split("/").map(Number);
  return y * 10000 + m * 100 + d;
}

// ============================================
// AUTH
// ============================================
function tryAutoLogin() {
  const saved = localStorage.getItem("rangsamble.user");
  if (saved) {
    try {
      state.user = JSON.parse(saved);
      enterApp();
      return true;
    } catch(e) {}
  }
  return false;
}

$("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const id = $("login-id").value.trim();
  const pw = $("login-pw").value;
  const errEl = $("login-error");
  errEl.textContent = "";

  if (id === ADMIN_LOGIN.id && pw === ADMIN_LOGIN.pw) {
    state.user = { name: "관리자", userId: "__admin__", isAdmin: true, isShared: false };
    localStorage.setItem("rangsamble.user", JSON.stringify(state.user));
    enterApp();
    return;
  }
  if (id === STUDENT_LOGIN.id && pw === STUDENT_LOGIN.pw) {
    state.user = { name: "공용 계정", userId: "__shared__", isAdmin: false, isShared: true };
    localStorage.setItem("rangsamble.user", JSON.stringify(state.user));
    enterApp();
    return;
  }
  try {
    const userDoc = await getDoc(doc(db, "users", id));
    if (userDoc.exists()) {
      const data = userDoc.data();
      if (data.password === pw) {
        state.user = {
          name: data.name, userId: id,
          email: data.email, phone: data.phone,
          isAdmin: false, isShared: false
        };
        localStorage.setItem("rangsamble.user", JSON.stringify(state.user));
        enterApp();
        return;
      }
    }
    errEl.textContent = "아이디 또는 비밀번호가 올바르지 않습니다.";
  } catch (err) {
    console.error(err);
    errEl.textContent = "로그인 중 오류가 발생했습니다.";
  }
});

$("goto-signup").addEventListener("click", () => {
  $("signup-error").textContent = "";
  ["signup-name","signup-email","signup-phone","signup-id","signup-pw","signup-pw2"]
    .forEach(k => $(k).value = "");
  showSignup();
});
$("goto-login").addEventListener("click", showLogin);

$("signup-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const name  = $("signup-name").value.trim();
  const email = $("signup-email").value.trim();
  const phone = $("signup-phone").value.trim();
  const id    = $("signup-id").value.trim();
  const pw    = $("signup-pw").value;
  const pw2   = $("signup-pw2").value;
  const errEl = $("signup-error");
  errEl.textContent = "";

  if (!name || !email || !phone || !id || !pw || !pw2) {
    errEl.textContent = "모든 항목을 입력해주세요."; return;
  }
  if (pw.length < 8) { errEl.textContent = "비밀번호는 8자 이상이어야 합니다."; return; }
  if (pw !== pw2)    { errEl.textContent = "비밀번호가 일치하지 않습니다."; return; }
  if (!/^[a-zA-Z0-9_]+$/.test(id)) {
    errEl.textContent = "아이디는 영문, 숫자, 밑줄(_)만 사용할 수 있습니다."; return;
  }
  if (id === ADMIN_LOGIN.id || id === STUDENT_LOGIN.id) {
    errEl.textContent = "사용할 수 없는 아이디입니다."; return;
  }

  try {
    const existing = await getDoc(doc(db, "users", id));
    if (existing.exists()) {
      errEl.textContent = "이미 사용 중인 아이디입니다."; return;
    }
    await setDoc(doc(db, "users", id), {
      name, email, phone, password: pw,
      createdAt: Timestamp.now()
    });
    state.user = { name, userId: id, email, phone, isAdmin: false, isShared: false };
    localStorage.setItem("rangsamble.user", JSON.stringify(state.user));
    showToast("가입이 완료되었습니다");
    enterApp();
  } catch (err) {
    console.error(err);
    errEl.textContent = "가입 중 오류가 발생했습니다.";
  }
});

$("logout-btn").addEventListener("click", () => {
  localStorage.removeItem("rangsamble.user");
  state.user = null;
  if (state.unsubscribe) { state.unsubscribe(); state.unsubscribe = null; }
  showLogin();
  $("login-id").value = "";
  $("login-pw").value = "";
});

function enterApp() {
  showApp();
  headerUser.textContent = state.user.name;
  headerUser.classList.toggle("is-admin", state.user.isAdmin);
  // 비밀번호 변경 버튼: 가입 회원만 표시 (공용계정/관리자는 숨김)
  const canChangePw = !state.user.isAdmin && !state.user.isShared;
  $("pw-change-btn").style.display = canChangePw ? "inline-block" : "none";
  subscribeRows();
}

// ============================================
// FIRESTORE SUBSCRIPTION
// ============================================
function subscribeRows() {
  if (state.unsubscribe) state.unsubscribe();
  const q = query(collection(db, "schedule"));
  state.unsubscribe = onSnapshot(q, (snap) => {
    const rows = [];
    snap.forEach(docSnap => {
      const d = docSnap.data();
      rows.push({
        id: docSnap.id,
        dateText: d.dateText || "",
        names: Array.isArray(d.names) ? d.names : [],
        createdAt: d.createdAt ? d.createdAt.toMillis() : 0,
      });
    });
    rows.sort((a, b) => {
      const ka = dateSortKey(a.dateText);
      const kb = dateSortKey(b.dateText);
      if (ka !== kb) return ka - kb;
      return a.createdAt - b.createdAt;
    });
    state.rows = rows;
    render();
  }, (err) => {
    console.error(err);
    tableWrap.innerHTML = `<div class="loading-row">데이터를 불러올 수 없습니다.</div>`;
  });
}

// ============================================
// RENDER
// ============================================
function render() {
  const isAdmin = state.user.isAdmin;
  const canPlaceName = !state.user.isShared;

  const wrap = document.createElement("div");

  if (state.rows.length === 0 && !isAdmin) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.textContent = "아직 예약 가능한 날짜가 없습니다.";
    wrap.appendChild(empty);
  } else {
    const table = document.createElement("table");
    table.className = "schedule-table";
    table.innerHTML = `<thead><tr><th>날짜</th><th>참여</th></tr></thead>`;
    const tbody = document.createElement("tbody");

    state.rows.forEach(row => {
      const tr = document.createElement("tr");

      // ---- date cell ----
      const dateCell = document.createElement("td");
      dateCell.className = "date-cell";

      if (isAdmin) {
        const input = document.createElement("input");
        input.type = "text";
        input.className = "date-input";
        input.value = row.dateText;
        input.placeholder = "예: 5/1";
        input.addEventListener("blur", async () => {
          const raw = input.value.trim();
          if (raw === row.dateText) return;
          const norm = normalizeDate(raw);
          const toSave = norm || raw;
          if (norm) input.value = norm;
          try {
            await updateDoc(doc(db, "schedule", row.id), { dateText: toSave });
          } catch (err) {
            console.error(err);
            showToast("날짜 저장 실패");
          }
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); input.blur(); }
        });
        dateCell.appendChild(input);

        const del = document.createElement("button");
        del.className = "row-delete";
        del.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M6 6l1 14a2 2 0 002 2h6a2 2 0 002-2l1-14"/></svg>`;
        del.title = "행 삭제";
        del.addEventListener("click", async (e) => {
          e.stopPropagation();
          if (!confirm("이 행을 삭제하시겠습니까?")) return;
          try {
            await deleteDoc(doc(db, "schedule", row.id));
            showToast("삭제되었습니다");
          } catch (err) {
            console.error(err);
            showToast("삭제 실패");
          }
        });
        dateCell.appendChild(del);
      } else {
        dateCell.textContent = row.dateText || "—";
      }
      tr.appendChild(dateCell);

      // ---- names cell ----
      const namesCell = document.createElement("td");
      namesCell.className = "names-cell";
      const list = document.createElement("div");
      list.className = "names-list";

      row.names.forEach((entry, idx) => {
        const chip = document.createElement("span");
        chip.className = "name-chip";
        chip.textContent = entry.name;

        const isOwn = !state.user.isShared && entry.userId === state.user.userId;
        if (isOwn || isAdmin) {
          chip.classList.add("clickable");
          chip.addEventListener("click", () => openChipModal(row, idx));
        }
        list.appendChild(chip);
      });

      if (canPlaceName) {
        const addBtn = document.createElement("button");
        addBtn.className = "add-name-btn";
        addBtn.textContent = isAdmin ? "+ 이름 추가" : "+ 내 이름 추가";
        addBtn.addEventListener("click", () => openNameModal(row));
        list.appendChild(addBtn);
      }

      namesCell.appendChild(list);
      tr.appendChild(namesCell);
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    wrap.appendChild(table);
  }

  if (isAdmin) {
    const addRow = document.createElement("button");
    addRow.className = "add-row-btn";
    addRow.textContent = "+ 날짜 추가";
    addRow.addEventListener("click", async () => {
      try {
        await addDoc(collection(db, "schedule"), {
          dateText: "",
          names: [],
          createdAt: Timestamp.now(),
        });
        setTimeout(() => {
          const inputs = tableWrap.querySelectorAll(".date-input");
          const last = Array.from(inputs).find(i => !i.value.trim());
          if (last) last.focus();
        }, 120);
      } catch (err) {
        console.error(err);
        showToast("추가 실패");
      }
    });
    wrap.appendChild(addRow);
  }

  tableWrap.innerHTML = "";
  tableWrap.appendChild(wrap);
}

// ============================================
// NAME MODAL
// ============================================
let nameModalRow = null;

function openNameModal(row) {
  nameModalRow = row;
  $("name-modal-date").textContent = row.dateText || "날짜 미정";
  $("name-error").classList.remove("visible");
  const input = $("name-input");
  if (!state.user.isAdmin) {
    input.value = state.user.name;
    input.placeholder = `예: ${state.user.name} (변경 가능성 있음)`;
  } else {
    input.value = "";
    input.placeholder = "예: 김지은 또는 김지은 (변경 가능성 있음)";
  }
  $("name-modal").classList.add("visible");
  setTimeout(() => input.focus(), 100);
}

function closeNameModal() {
  $("name-modal").classList.remove("visible");
  nameModalRow = null;
}

$("name-cancel").addEventListener("click", closeNameModal);
$("name-modal").addEventListener("click", (e) => {
  if (e.target.id === "name-modal") closeNameModal();
});
$("name-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); $("name-save").click(); }
});

$("name-save").addEventListener("click", async () => {
  if (!nameModalRow) return;
  const text = $("name-input").value.trim();
  const errEl = $("name-error");
  errEl.classList.remove("visible");
  if (!text) {
    errEl.textContent = "이름을 입력해주세요.";
    errEl.classList.add("visible");
    return;
  }

  const entry = {
    userId: state.user.userId,
    name: text,
    addedAt: Date.now(),
  };
  const newNames = [...nameModalRow.names, entry];
  try {
    await updateDoc(doc(db, "schedule", nameModalRow.id), { names: newNames });
    closeNameModal();
    showToast("추가되었습니다");
  } catch (err) {
    console.error(err);
    errEl.textContent = "저장 중 오류가 발생했습니다.";
    errEl.classList.add("visible");
  }
});

// ============================================
// CHIP MODAL
// ============================================
let chipModalRow = null;
let chipModalIdx = -1;

function openChipModal(row, idx) {
  chipModalRow = row;
  chipModalIdx = idx;
  $("chip-modal-name").textContent = row.names[idx].name;
  $("chip-modal-date").textContent = row.dateText || "날짜 미정";
  $("chip-modal").classList.add("visible");
}

function closeChipModal() {
  $("chip-modal").classList.remove("visible");
  chipModalRow = null;
  chipModalIdx = -1;
}

$("chip-close").addEventListener("click", closeChipModal);
$("chip-modal").addEventListener("click", (e) => {
  if (e.target.id === "chip-modal") closeChipModal();
});

$("chip-delete").addEventListener("click", async () => {
  if (!chipModalRow || chipModalIdx < 0) return;
  const entry = chipModalRow.names[chipModalIdx];
  if (!confirm(`"${entry.name}" 을(를) 삭제하시겠습니까?`)) return;

  const newNames = chipModalRow.names.filter((_, i) => i !== chipModalIdx);
  try {
    await updateDoc(doc(db, "schedule", chipModalRow.id), { names: newNames });
    closeChipModal();
    showToast("삭제되었습니다");
  } catch (err) {
    console.error(err);
    alert("삭제 중 오류가 발생했습니다.");
  }
});

// ============================================
// PASSWORD CHANGE MODAL
// ============================================
$("pw-change-btn").addEventListener("click", () => {
  $("pw-error").classList.remove("visible");
  $("pw-current").value = "";
  $("pw-new").value = "";
  $("pw-new2").value = "";
  $("pw-modal").classList.add("visible");
  setTimeout(() => $("pw-current").focus(), 100);
});

function closePwModal() {
  $("pw-modal").classList.remove("visible");
}

$("pw-cancel").addEventListener("click", closePwModal);
$("pw-modal").addEventListener("click", (e) => {
  if (e.target.id === "pw-modal") closePwModal();
});
$("pw-new2").addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); $("pw-save").click(); }
});

$("pw-save").addEventListener("click", async () => {
  const cur  = $("pw-current").value;
  const nw   = $("pw-new").value;
  const nw2  = $("pw-new2").value;
  const errEl = $("pw-error");
  errEl.classList.remove("visible");

  if (!cur || !nw || !nw2) {
    errEl.textContent = "모든 항목을 입력해주세요.";
    errEl.classList.add("visible");
    return;
  }
  if (nw.length < 8) {
    errEl.textContent = "새 비밀번호는 8자 이상이어야 합니다.";
    errEl.classList.add("visible");
    return;
  }
  if (nw !== nw2) {
    errEl.textContent = "새 비밀번호가 일치하지 않습니다.";
    errEl.classList.add("visible");
    return;
  }
  if (nw === cur) {
    errEl.textContent = "새 비밀번호가 기존과 동일합니다.";
    errEl.classList.add("visible");
    return;
  }

  try {
    // 현재 비밀번호 확인 (Firestore에서 다시 조회)
    const userDoc = await getDoc(doc(db, "users", state.user.userId));
    if (!userDoc.exists()) {
      errEl.textContent = "계정 정보를 찾을 수 없습니다.";
      errEl.classList.add("visible");
      return;
    }
    if (userDoc.data().password !== cur) {
      errEl.textContent = "현재 비밀번호가 올바르지 않습니다.";
      errEl.classList.add("visible");
      return;
    }
    // 업데이트
    await updateDoc(doc(db, "users", state.user.userId), { password: nw });
    closePwModal();
    showToast("비밀번호가 변경되었습니다");
  } catch (err) {
    console.error(err);
    errEl.textContent = "변경 중 오류가 발생했습니다.";
    errEl.classList.add("visible");
  }
});

// ============================================
// BOOT
// ============================================
if (!tryAutoLogin()) {
  showLogin();
}
</script>
