<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FAF8F5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="스케쥴">
<title>스케쥴</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&family=Noto+Serif+KR:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #FAF8F5;
    --bg-elevated: #FFFFFF;
    --ink: #2A2724;
    --ink-soft: #6B6560;
    --ink-faint: #A8A19A;
    --line: #E8E2DA;
    --line-soft: #F0EBE3;
    --accent: #3B2F4A;
    --accent-soft: #5A4A6E;
    --danger: #8B3A3A;
    --name-bg: #EDE6D9;
    --name-ink: #6B5B3E;

    --serif: 'Cormorant Garamond', 'Noto Serif KR', serif;
    --sans: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;

    --radius: 6px;
    --radius-lg: 10px;
    --shadow-sm: 0 1px 2px rgba(42, 39, 36, 0.04);
    --shadow-md: 0 4px 16px rgba(42, 39, 36, 0.08);
    --shadow-lg: 0 12px 40px rgba(42, 39, 36, 0.12);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--ink);
    font-family: var(--sans); font-size: 16px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
  }

  button {
    font-family: inherit; font-size: inherit; color: inherit;
    background: none; border: none; cursor: pointer; padding: 0;
  }

  input { font-family: inherit; font-size: inherit; color: inherit; }

  /* LOGIN / SIGNUP */
  #login-screen, #signup-screen, #recover-screen {
    min-height: 100vh; min-height: 100dvh;
    display: none;
    align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(ellipse at top, rgba(59, 47, 74, 0.04) 0%, transparent 60%),
      var(--bg);
  }
  #login-screen.visible, #signup-screen.visible, #recover-screen.visible { display: flex; }

  .login-card { width: 100%; max-width: 380px; text-align: center; }

  .login-title {
    font-family: var(--serif); font-size: 64px; font-weight: 500;
    line-height: 1; margin: 0 0 12px; color: var(--ink);
    letter-spacing: -0.01em;
  }
  .login-subtitle {
    font-family: var(--serif); font-style: italic; font-size: 18px;
    color: var(--ink-soft); margin-bottom: 56px;
  }
  #signup-screen .login-title, #recover-screen .login-title { font-size: 56px; }
  #signup-screen .login-subtitle, #recover-screen .login-subtitle { margin-bottom: 40px; }

  .login-divider {
    display: flex; align-items: center; gap: 16px;
    margin: 0 auto 40px; width: 60%;
  }
  .login-divider::before, .login-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--line);
  }
  .login-divider span {
    font-family: var(--serif); font-style: italic;
    color: var(--ink-faint); font-size: 14px;
  }

  .login-form { display: flex; flex-direction: column; gap: 16px; }
  .login-form input {
    width: 100%; padding: 16px 18px;
    background: var(--bg-elevated);
    border: 1px solid var(--line); border-radius: var(--radius);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .login-form input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59, 47, 74, 0.08);
  }
  .login-form input::placeholder { color: var(--ink-faint); }

  .login-button {
    width: 100%; padding: 16px;
    background: var(--accent); color: #FFFFFF;
    border-radius: var(--radius);
    font-weight: 500; letter-spacing: 0.05em;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
  }
  .login-button:hover { background: var(--accent-soft); }
  .login-button:active { transform: scale(0.98); }
  .login-button:disabled { opacity: 0.6; cursor: not-allowed; }

  .login-error {
    color: var(--danger); font-size: 14px;
    margin-top: 12px; min-height: 20px;
  }

  .login-footer {
    margin-top: 32px; font-size: 13px; color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    flex-wrap: wrap;
  }
  .link-btn {
    color: var(--accent); font-size: 13px; font-weight: 500;
    padding: 4px 8px; border-radius: 4px; transition: background 0.2s;
  }
  .link-btn:hover { background: rgba(59, 47, 74, 0.06); }

  /* APP */
  #app-screen {
    display: none; min-height: 100vh; min-height: 100dvh;
    flex-direction: column;
  }
  #app-screen.visible { display: flex; }

  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-elevated);
    position: sticky; top: 0; z-index: 10;
    gap: 8px;
  }
  .header-brand {
    font-family: var(--serif); font-size: 22px; font-weight: 500;
    letter-spacing: 0.02em; color: var(--ink);
    flex-shrink: 0;
  }
  .header-right {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--ink-soft);
    flex-wrap: wrap; justify-content: flex-end;
  }
  .header-user { font-family: var(--serif); font-style: italic; }
  .header-user.is-admin::after {
    content: ' · 관리자'; color: var(--accent); font-style: normal;
  }
  .header-btn {
    color: var(--ink-faint); font-size: 13px;
    padding: 6px 10px; border-radius: var(--radius);
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
  }
  .header-btn:hover { color: var(--ink); background: var(--line-soft); }

  /* SCHEDULE TABLE */
  .page-title-wrap {
    padding: 32px 24px 20px;
    text-align: center;
    border-bottom: 1px solid var(--line-soft);
  }
  .page-title {
    font-family: var(--serif); font-size: 34px; font-weight: 500;
    margin: 0; letter-spacing: 0.01em;
  }

  .table-wrap {
    flex: 1; overflow-y: auto;
    padding: 24px 16px 100px;
    max-width: 760px; width: 100%; margin: 0 auto;
  }

  .loading-row {
    text-align: center; padding: 60px 20px;
    color: var(--ink-faint);
    font-family: var(--serif); font-style: italic;
  }

  .schedule-table {
    width: 100%;
    border-collapse: separate; border-spacing: 0;
    background: var(--bg-elevated);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--line);
  }
  .schedule-table thead th {
    background: var(--line-soft);
    font-family: var(--serif); font-weight: 500; font-size: 13px;
    color: var(--ink-soft); text-align: left;
    padding: 14px 18px;
    letter-spacing: 0.08em; text-transform: uppercase;
    border-bottom: 1px solid var(--line);
  }
  .schedule-table thead th:nth-child(1) { width: 30%; }
  .schedule-table thead th:nth-child(2) { width: 30%; }
  .schedule-table thead th:nth-child(3) { width: 40%; }

  .schedule-table tbody tr { border-bottom: 1px solid var(--line-soft); }
  .schedule-table tbody tr:last-child td { border-bottom: none; }
  .schedule-table tbody td { border-bottom: 1px solid var(--line-soft); }
  .schedule-table td { padding: 16px 18px; vertical-align: top; }

  .date-cell {
    font-family: var(--serif); font-size: 21px;
    color: var(--ink); font-weight: 500;
    white-space: nowrap;
    border-right: 1px solid var(--line-soft);
    position: relative;
  }
  .date-cell .date-input {
    width: 100%;
    font: inherit; color: inherit;
    background: transparent; border: none; padding: 0;
    border-bottom: 1px dashed var(--ink-faint);
  }
  .date-cell .date-input:focus { outline: none; border-bottom-color: var(--accent); }
  .date-cell .date-input::placeholder {
    color: var(--ink-faint); font-style: italic; font-size: 16px;
  }

  .info-cell {
    font-size: 14px; color: var(--ink-soft);
    border-right: 1px solid var(--line-soft);
    word-break: break-word;
  }
  .info-cell .info-input {
    width: 100%;
    font: inherit; color: var(--ink);
    background: transparent;
    border: none; padding: 4px 0;
    border-bottom: 1px dashed var(--ink-faint);
  }
  .info-cell .info-input:focus { outline: none; border-bottom-color: var(--accent); }
  .info-cell .info-input::placeholder {
    color: var(--ink-faint); font-style: italic;
  }

  .row-delete {
    position: absolute;
    right: 6px; top: 50%;
    transform: translateY(-50%);
    width: 28px; height: 28px;
    border-radius: 50%;
    color: var(--ink-faint);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, background 0.15s;
  }
  .date-cell:hover .row-delete { opacity: 1; }
  .row-delete:hover { color: var(--danger); background: var(--line-soft); }

  .names-cell { min-height: 48px; }
  .names-list {
    display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center; min-height: 32px;
  }
  .name-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 13px;
    background: var(--name-bg); color: var(--name-ink);
    border-radius: 999px;
    font-size: 14px; font-weight: 500;
    cursor: default;
    transition: transform 0.15s, box-shadow 0.15s;
    max-width: 100%;
  }
  .name-chip.clickable { cursor: pointer; }
  .name-chip.clickable:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }
  .add-name-btn {
    padding: 6px 14px;
    border: 1px dashed var(--line);
    border-radius: 999px;
    font-size: 13px;
    color: var(--ink-soft);
    transition: all 0.2s;
  }
  .add-name-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    border-style: solid;
  }
  .add-row-btn {
    display: block;
    margin: 20px auto 0;
    padding: 12px 28px;
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    font-size: 14px;
    color: var(--ink-soft);
    background: transparent;
    transition: all 0.2s;
  }
  .add-row-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    border-style: solid;
  }
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--ink-faint);
    font-family: var(--serif); font-style: italic;
    font-size: 17px;
  }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(42, 39, 36, 0.35);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center; justify-content: center;
    padding: 20px; z-index: 100;
    animation: fadeIn 0.2s ease;
  }
  .modal-backdrop.visible { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal {
    background: var(--bg-elevated);
    border-radius: var(--radius-lg);
    width: 100%; max-width: 400px;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.25s ease;
    overflow: hidden;
  }
  .modal.modal-wide { max-width: 560px; }
  .modal-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--line-soft);
  }
  .modal-title {
    font-family: var(--serif); font-size: 26px; font-weight: 500;
    margin: 0; line-height: 1.2;
  }
  .modal-subtitle {
    font-family: var(--serif); font-style: italic;
    font-size: 14px; color: var(--ink-soft);
    margin-top: 4px;
  }
  .modal-body { padding: 20px 24px; }
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block; font-size: 12px;
    color: var(--ink-soft); margin-bottom: 6px;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .field input {
    width: 100%; padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--bg-elevated);
    transition: border-color 0.2s;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .field .hint {
    font-size: 12px; color: var(--ink-faint);
    margin-top: 6px; font-style: italic;
  }
  .modal-footer {
    padding: 16px 24px 24px;
    display: flex; gap: 10px; justify-content: flex-end;
  }
  .btn {
    padding: 11px 20px;
    border-radius: var(--radius);
    font-size: 14px; font-weight: 500;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #FFFFFF; }
  .btn-primary:hover { background: var(--accent-soft); }
  .btn-secondary {
    background: var(--bg); color: var(--ink-soft);
    border: 1px solid var(--line);
  }
  .btn-secondary:hover { color: var(--ink); border-color: var(--ink-soft); }
  .btn-danger {
    background: transparent; color: var(--danger);
    border: 1px solid var(--danger);
    margin-right: auto;
  }
  .btn-danger:hover { background: var(--danger); color: #FFFFFF; }
  .modal-error {
    background: #FBF1F1; color: var(--danger);
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
  }
  .modal-error.visible { display: block; }

  /* members list */
  .member-list {
    max-height: 60vh;
    overflow-y: auto;
    margin: 0 -24px;
  }
  .member-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--line-soft);
  }
  .member-row:last-child { border-bottom: none; }
  .member-info { flex: 1; min-width: 0; }
  .member-name {
    font-family: var(--serif); font-size: 18px; font-weight: 500;
    color: var(--ink); line-height: 1.2;
  }
  .member-meta {
    font-size: 12px; color: var(--ink-faint);
    margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .member-badge {
    font-size: 10px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-family: var(--sans);
    font-style: normal;
    font-weight: 500;
  }
  .member-delete-btn {
    padding: 7px 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    font-size: 12px;
    color: var(--ink-soft);
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .member-delete-btn:hover {
    color: var(--danger);
    border-color: var(--danger);
  }
  .members-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-faint);
    font-family: var(--serif); font-style: italic;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink); color: var(--bg);
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 14px;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 200;
    pointer-events: none;
  }
  .toast.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* RESPONSIVE */
  @media (max-width: 767px) {
    .header-brand { font-size: 19px; }
    .login-title { font-size: 52px; }
    .page-title-wrap { padding: 24px 16px 16px; }
    .page-title { font-size: 28px; }
    .table-wrap { padding: 16px 8px 100px; }
    .schedule-table thead th {
      padding: 10px 8px; font-size: 10px; letter-spacing: 0.04em;
    }
    .schedule-table td { padding: 12px 8px; }
    .date-cell { font-size: 15px; }
    .info-cell { font-size: 12px; }
    .schedule-table thead th:nth-child(1) { width: 30%; }
    .schedule-table thead th:nth-child(2) { width: 28%; }
    .schedule-table thead th:nth-child(3) { width: 42%; }
    .name-chip { font-size: 12px; padding: 5px 10px; }
    .add-name-btn { font-size: 11px; padding: 5px 10px; }
    .row-delete { opacity: 1; }
    .header-btn { font-size: 12px; padding: 5px 7px; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <h1 class="login-title">스케쥴</h1>
    <p class="login-subtitle">Schedule</p>
    <div class="login-divider"><span>로그인</span></div>
    <form class="login-form" id="login-form" autocomplete="off">
      <input type="email" id="login-email" placeholder="이메일" autocomplete="email">
      <input type="password" id="login-pw" placeholder="비밀번호" autocomplete="current-password">
      <button type="submit" class="login-button" id="login-submit">입장</button>
      <div class="login-error" id="login-error"></div>
    </form>
    <div class="login-footer">
      <span>아직 계정이 없으신가요?</span>
      <button type="button" class="link-btn" id="goto-signup">회원가입</button>
      <span>·</span>
      <button type="button" class="link-btn" id="forgot-pw">비밀번호 찾기</button>
    </div>
  </div>
</div>

<!-- SIGNUP SCREEN -->
<div id="signup-screen">
  <div class="login-card">
    <h1 class="login-title">스케쥴</h1>
    <p class="login-subtitle">회원가입</p>
    <div class="login-divider"><span>Sign up</span></div>
    <form class="login-form" id="signup-form" autocomplete="off">
      <input type="text"  id="signup-name"   placeholder="이름" autocomplete="name">
      <input type="email" id="signup-email"  placeholder="이메일" autocomplete="email">
      <input type="password" id="signup-pw"  placeholder="비밀번호 (8자 이상)" autocomplete="new-password">
      <input type="password" id="signup-pw2" placeholder="비밀번호 확인" autocomplete="new-password">
      <input type="text"  id="signup-invite" placeholder="초대코드" autocomplete="off">
      <button type="submit" class="login-button" id="signup-submit">가입하기</button>
      <div class="login-error" id="signup-error"></div>
    </form>
    <div class="login-footer">
      <span>이미 계정이 있으신가요?</span>
      <button type="button" class="link-btn" id="goto-login">로그인</button>
    </div>
  </div>
</div>

<!-- RECOVER PROFILE SCREEN -->
<div id="recover-screen">
  <div class="login-card">
    <h1 class="login-title">스케쥴</h1>
    <p class="login-subtitle">프로필 복구</p>
    <div class="login-divider"><span>Welcome back</span></div>
    <p style="font-size:13px;color:var(--ink-soft);margin:-20px 0 24px;line-height:1.6;">
      이전에 가입했던 계정이 탈퇴된 상태입니다.<br>
      이름과 초대코드를 다시 입력하면 복구됩니다.
    </p>
    <form class="login-form" id="recover-form" autocomplete="off">
      <input type="text" id="recover-name"   placeholder="이름" autocomplete="name">
      <input type="text" id="recover-invite" placeholder="초대코드" autocomplete="off">
      <button type="submit" class="login-button" id="recover-submit">복구하기</button>
      <div class="login-error" id="recover-error"></div>
    </form>
    <div class="login-footer">
      <button type="button" class="link-btn" id="recover-cancel">취소 (로그아웃)</button>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <header class="app-header">
    <div class="header-brand">스케쥴</div>
    <div class="header-right">
      <span class="header-user" id="header-user"></span>
      <button class="header-btn" id="members-btn" style="display:none">회원 관리</button>
      <button class="header-btn" id="pw-change-btn">비밀번호 변경</button>
      <button class="header-btn" id="logout-btn">로그아웃</button>
    </div>
  </header>

  <div class="page-title-wrap">
    <h1 class="page-title">스케쥴</h1>
  </div>

  <div class="table-wrap" id="table-wrap">
    <div class="loading-row">불러오는 중…</div>
  </div>
</div>

<!-- ADD NAME MODAL -->
<div class="modal-backdrop" id="name-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">이름 추가</h2>
      <p class="modal-subtitle" id="name-modal-date">—</p>
    </div>
    <div class="modal-body">
      <div class="modal-error" id="name-error"></div>
      <div class="field">

async function sha256(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text + SECRET_SALT));
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2, "0")).join("");
}

// ============================================
// DATE NORMALIZATION
// ============================================
function normalizeDate(input) {
  if (!input) return null;
  const s = String(input).trim();
  if (!s) return null;
  const cleaned = s.replace(/[-.]/g, "/").replace(/\s+/g, "");
  const parts = cleaned.split("/").filter(Boolean);

  let y, m, d;
  if (parts.length === 2) {
    y = new Date().getFullYear();
    m = parseInt(parts[0], 10);
    d = parseInt(parts[1], 10);
  } else if (parts.length === 3) {
    y = parseInt(parts[0], 10);
    m = parseInt(parts[1], 10);
    d = parseInt(parts[2], 10);
    if (y < 100) y += 2000;
  } else {
    return null;
  }

  if (!Number.isFinite(y) || !Number.isFinite(m) || !Number.isFinite(d)) return null;
  if (m < 1 || m > 12 || d < 1 || d > 31) return null;

  const pad = n => String(n).padStart(2, "0");
  return `${y}/${pad(m)}/${pad(d)}`;
}

function dateSortKey(dateText) {
  const norm = normalizeDate(dateText);
  if (!norm) return Number.MAX_SAFE_INTEGER;
  const [y, m, d] = norm.split("/").map(Number);
  return y * 10000 + m * 100 + d;
}

      // 관리자인데 프로필이 없으면 자동 생성

        const autoName = fbUser.email ? fbUser.email.split("@")[0] : "관리자";
        await setDoc(doc(db, "users", fbUser.uid), {
          name: autoName,
          email: fbUser.email,
          createdAt: Timestamp.now()
        });
        profile = { name: autoName, email: fbUser.email };
      }

      if (!profile) {
        // 프로필 없고 관리자도 아님 → 탈퇴된 계정. 복구 화면 표시.
        state.user = null;

        $("recover-invite").value = "";

      state.user = {

        name: profile.name,
        isAdmin: isAdmin
      };
      enterApp();
    } catch (err) {
      console.error("auth state error", err);
      await signOut(auth);
    }

    state.user = null;

});

$("signup-form").addEventListener("submit", async (e) => {

  }
  const inviteHash = await sha256(invite);
  if (inviteHash !== INVITE_CODE_HASH) {

    console.error(err);
    if (err.code === "auth/email-already-in-use") {
      errEl.textContent = "이미 가입된 이메일입니다.";
    } else if (err.code === "auth/invalid-email") {
      errEl.textContent = "이메일 형식이 올바르지 않습니다.";
    } else if (err.code === "auth/weak-password") {
      errEl.textContent = "비밀번호가 너무 약합니다.";
    } else {
      errEl.textContent = "가입 중 오류가 발생했습니다.";

  } finally {

});

// ============================================
// FIRESTORE SUBSCRIPTION
// ============================================
function subscribeRows() {
  if (state.unsubscribe) state.unsubscribe();
  const q = query(collection(db, "schedule"));
  state.unsubscribe = onSnapshot(q, (snap) => {
    const rows = [];
    snap.forEach(docSnap => {
      const d = docSnap.data();
      rows.push({
        id: docSnap.id,
        dateText: d.dateText || "",
        info: d.info || "",
        names: Array.isArray(d.names) ? d.names : [],
        createdAt: d.createdAt ? d.createdAt.toMillis() : 0,
      });
    });
    rows.sort((a, b) => {
      const ka = dateSortKey(a.dateText);
      const kb = dateSortKey(b.dateText);
      if (ka !== kb) return ka - kb;
      return a.createdAt - b.createdAt;
    });
    state.rows = rows;
    render();
  }, (err) => {
    console.error(err);
    tableWrap.innerHTML = `<div class="loading-row">데이터를 불러올 수 없습니다.</div>`;
  });
}

// ============================================
// RENDER
// ============================================
function render() {
  const isAdmin = state.user.isAdmin;
  const wrap = document.createElement("div");

  if (state.rows.length === 0 && !isAdmin) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.textContent = "아직 예약 가능한 날짜가 없습니다.";
    wrap.appendChild(empty);
  } else {
    const table = document.createElement("table");
    table.className = "schedule-table";
    table.innerHTML = `<thead><tr><th>날짜</th><th>추가정보</th><th>참여</th></tr></thead>`;
    const tbody = document.createElement("tbody");

    state.rows.forEach(row => {
      const tr = document.createElement("tr");

      // date cell
      const dateCell = document.createElement("td");
      dateCell.className = "date-cell";
      if (isAdmin) {
        const input = document.createElement("input");
        input.type = "text";
        input.className = "date-input";
        input.value = row.dateText;
        input.placeholder = "예: 5/1";
        input.addEventListener("blur", async () => {
          const raw = input.value.trim();
          if (raw === row.dateText) return;
          const norm = normalizeDate(raw);
          const toSave = norm || raw;
          if (norm) input.value = norm;
          try {
            await updateDoc(doc(db, "schedule", row.id), { dateText: toSave });
          } catch (err) {
            console.error(err);
            showToast("날짜 저장 실패");
          }
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); input.blur(); }
        });
        dateCell.appendChild(input);

        const del = document.createElement("button");
        del.className = "row-delete";
        del.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M6 6l1 14a2 2 0 002 2h6a2 2 0 002-2l1-14"/></svg>`;
        del.title = "행 삭제";
        del.addEventListener("click", async (e) => {
          e.stopPropagation();
          if (!confirm("이 행을 삭제하시겠습니까?")) return;
          try {
            await deleteDoc(doc(db, "schedule", row.id));
            showToast("삭제되었습니다");
          } catch (err) {
            console.error(err);
            showToast("삭제 실패");
          }
        });
        dateCell.appendChild(del);
      } else {
        dateCell.textContent = row.dateText || "—";
      }
      tr.appendChild(dateCell);

      // info cell
      const infoCell = document.createElement("td");
      infoCell.className = "info-cell";
      if (isAdmin) {
        const infoInput = document.createElement("input");
        infoInput.type = "text";
        infoInput.className = "info-input";
        infoInput.value = row.info || "";
        infoInput.placeholder = "추가정보";
        infoInput.addEventListener("blur", async () => {
          const raw = infoInput.value.trim();
          if (raw === (row.info || "")) return;
          try {
            await updateDoc(doc(db, "schedule", row.id), { info: raw });
          } catch (err) {
            console.error(err);
            showToast("저장 실패");
          }
        });
        infoInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); infoInput.blur(); }
        });
        infoCell.appendChild(infoInput);
      } else {
        infoCell.textContent = row.info || "";
      }
      tr.appendChild(infoCell);

      // names cell
      const namesCell = document.createElement("td");
      namesCell.className = "names-cell";
      const list = document.createElement("div");
      list.className = "names-list";

      row.names.forEach((entry, idx) => {
        const chip = document.createElement("span");
        chip.className = "name-chip";
        chip.textContent = entry.name;

        const isOwn = entry.userId === state.user.uid;
        if (isOwn || isAdmin) {
          chip.classList.add("clickable");
          chip.addEventListener("click", () => openChipModal(row, idx));
        }
        list.appendChild(chip);
      });

      const addBtn = document.createElement("button");
      addBtn.className = "add-name-btn";
      addBtn.textContent = isAdmin ? "+ 이름 추가" : "+ 내 이름 추가";
      addBtn.addEventListener("click", () => openNameModal(row));
      list.appendChild(addBtn);

      namesCell.appendChild(list);
      tr.appendChild(namesCell);
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    wrap.appendChild(table);
  }

  if (isAdmin) {
    const addRow = document.createElement("button");
    addRow.className = "add-row-btn";
    addRow.textContent = "+ 날짜 추가";
    addRow.addEventListener("click", async () => {
      try {
        await addDoc(collection(db, "schedule"), {
          dateText: "",
          info: "",
          names: [],
          createdAt: Timestamp.now(),
        });
        setTimeout(() => {
          const inputs = tableWrap.querySelectorAll(".date-input");
          const last = Array.from(inputs).find(i => !i.value.trim());
          if (last) last.focus();
        }, 120);
      } catch (err) {
        console.error(err);
        showToast("추가 실패");
      }
    });
    wrap.appendChild(addRow);
  }

  tableWrap.innerHTML = "";
  tableWrap.appendChild(wrap);
}

// ============================================
// NAME MODAL
// ============================================
let nameModalRow = null;

function openNameModal(row) {
  nameModalRow = row;
  $("name-modal-date").textContent = row.dateText || "날짜 미정";
  $("name-error").classList.remove("visible");
  const input = $("name-input");
  if (!state.user.isAdmin) {
    input.value = state.user.name;
    input.placeholder = `예: ${state.user.name} (변경 가능성 있음)`;
  } else {
    input.value = "";
    input.placeholder = "예: 김지은 또는 김지은 (변경 가능성 있음)";
  }
  $("name-modal").classList.add("visible");
  setTimeout(() => input.focus(), 100);
}

function closeNameModal() {
  $("name-modal").classList.remove("visible");
  nameModalRow = null;
}

$("name-cancel").addEventListener("click", closeNameModal);
$("name-modal").addEventListener("click", (e) => {
  if (e.target.id === "name-modal") closeNameModal();
});
$("name-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); $("name-save").click(); }
});

$("name-save").addEventListener("click", async () => {
  if (!nameModalRow) return;
  const text = $("name-input").value.trim();
  const errEl = $("name-error");
  errEl.classList.remove("visible");
  if (!text) {
    errEl.textContent = "이름을 입력해주세요.";
    errEl.classList.add("visible");
    return;
  }

  const entry = {
    userId: state.user.uid,
    name: text,
    addedAt: Date.now(),
  };
  const newNames = [...nameModalRow.names, entry];
  try {
    await updateDoc(doc(db, "schedule", nameModalRow.id), { names: newNames });
    closeNameModal();
    showToast("추가되었습니다");
  } catch (err) {
    console.error(err);
    errEl.textContent = "저장 중 오류가 발생했습니다.";
    errEl.classList.add("visible");
  }
});

// ============================================
// CHIP MODAL
// ============================================
let chipModalRow = null;
let chipModalIdx = -1;

function openChipModal(row, idx) {
  chipModalRow = row;
  chipModalIdx = idx;
  $("chip-modal-name").textContent = row.names[idx].name;
  $("chip-modal-date").textContent = row.dateText || "날짜 미정";
  $("chip-modal").classList.add("visible");
}

function closeChipModal() {
  $("chip-modal").classList.remove("visible");
  chipModalRow = null;
  chipModalIdx = -1;
}

$("chip-close").addEventListener("click", closeChipModal);
$("chip-modal").addEventListener("click", (e) => {
  if (e.target.id === "chip-modal") closeChipModal();
});

$("chip-delete").addEventListener("click", async () => {
  if (!chipModalRow || chipModalIdx < 0) return;
  const entry = chipModalRow.names[chipModalIdx];
  if (!confirm(`"${entry.name}" 을(를) 삭제하시겠습니까?`)) return;

  const newNames = chipModalRow.names.filter((_, i) => i !== chipModalIdx);
  try {
    await updateDoc(doc(db, "schedule", chipModalRow.id), { names: newNames });
    closeChipModal();
    showToast("삭제되었습니다");
  } catch (err) {
    console.error(err);
    alert("삭제 중 오류가 발생했습니다.");
  }
});

// ============================================
// PASSWORD CHANGE MODAL
// ============================================
$("pw-change-btn").addEventListener("click", () => {
  const btn = $("pw-change-btn");
  if (btn.disabled) return;

  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = "잠시만요…";

  $("pw-error").classList.remove("visible");
  $("pw-current").value = "";
  $("pw-new").value = "";
  $("pw-new2").value = "";
  $("pw-modal").classList.add("visible");

  setTimeout(() => {
    $("pw-current").focus();
    btn.disabled = false;
    btn.textContent = originalText;
  }, 300);
});

function closePwModal() { $("pw-modal").classList.remove("visible"); }
$("pw-cancel").addEventListener("click", closePwModal);
$("pw-modal").addEventListener("click", (e) => {
  if (e.target.id === "pw-modal") closePwModal();
});
$("pw-new2").addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); $("pw-save").click(); }
});

$("pw-save").addEventListener("click", async () => {
  const saveBtn = $("pw-save");
  if (saveBtn.disabled) return;

  const cur  = $("pw-current").value;
  const nw   = $("pw-new").value;
  const nw2  = $("pw-new2").value;
  const errEl = $("pw-error");
  errEl.classList.remove("visible");

  if (!cur || !nw || !nw2) {
    errEl.textContent = "모든 항목을 입력해주세요.";
    errEl.classList.add("visible"); return;
  }
  if (nw.length < 8) {
    errEl.textContent = "새 비밀번호는 8자 이상이어야 합니다.";
    errEl.classList.add("visible"); return;
  }
  if (nw !== nw2) {
    errEl.textContent = "새 비밀번호가 일치하지 않습니다.";
    errEl.classList.add("visible"); return;
  }

  const originalText = saveBtn.textContent;
  saveBtn.disabled = true;
  saveBtn.textContent = "변경 중…";

  try {
    const fbUser = auth.currentUser;
    if (!fbUser) throw new Error("not signed in");
    const cred = EmailAuthProvider.credential(fbUser.email, cur);
    await reauthenticateWithCredential(fbUser, cred);
    await updatePassword(fbUser, nw);
    closePwModal();
    showToast("비밀번호가 변경되었습니다");
  } catch (err) {
    console.error(err);
    if (err.code === "auth/wrong-password" || err.code === "auth/invalid-credential") {
      errEl.textContent = "현재 비밀번호가 올바르지 않습니다.";
    } else if (err.code === "auth/weak-password") {
      errEl.textContent = "비밀번호가 너무 약합니다.";
    } else {
      errEl.textContent = "변경 중 오류가 발생했습니다.";
    }
    errEl.classList.add("visible");
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = originalText;
  }
});

// ============================================
// MEMBERS MANAGEMENT MODAL
// ============================================
$("members-btn").addEventListener("click", async () => {
  $("members-modal").classList.add("visible");
  await renderMembersList();
});

function closeMembersModal() { $("members-modal").classList.remove("visible"); }
$("members-close").addEventListener("click", closeMembersModal);
$("members-modal").addEventListener("click", (e) => {
  if (e.target.id === "members-modal") closeMembersModal();
});

async function renderMembersList() {
  const body = $("members-body");
  body.innerHTML = `<div class="loading-row">불러오는 중…</div>`;
  try {
    const [usersSnap, adminsSnap] = await Promise.all([
      getDocs(collection(db, "users")),
      getDocs(collection(db, "admins"))
    ]);
    const adminIds = new Set();
    adminsSnap.forEach(d => adminIds.add(d.id));

    const members = [];
    usersSnap.forEach(docSnap => {
      members.push({ uid: docSnap.id, ...docSnap.data(), isAdmin: adminIds.has(docSnap.id) });
    });
    members.sort((a, b) => (a.name || "").localeCompare(b.name || "", "ko"));

    if (members.length === 0) {
      body.innerHTML = `<div class="members-empty">가입한 회원이 없습니다.</div>`;
      return;
    }

    const wrap = document.createElement("div");
    wrap.className = "member-list";
    members.forEach(m => {
      const row = document.createElement("div");
      row.className = "member-row";

      const info = document.createElement("div");
      info.className = "member-info";

      const nameEl = document.createElement("div");
      nameEl.className = "member-name";
      nameEl.textContent = m.name || "(이름 없음)";
      if (m.isAdmin) {
        const badge = document.createElement("span");
        badge.className = "member-badge";
        badge.textContent = "관리자";
        nameEl.appendChild(badge);
      }
      info.appendChild(nameEl);

      const meta = document.createElement("div");
      meta.className = "member-meta";
      meta.textContent = m.email || "";
      info.appendChild(meta);
      row.appendChild(info);

      if (!m.isAdmin) {
        const delBtn = document.createElement("button");
        delBtn.className = "member-delete-btn";
        delBtn.textContent = "탈퇴";
        delBtn.addEventListener("click", async () => {
          if (!confirm(`"${m.name}" 님을 탈퇴 처리하시겠습니까?\n\n주의:\n- 이 회원의 프로필이 삭제되어 더 이상 로그인 시 앱에 들어올 수 없습니다.\n- 이 회원이 추가한 기존 예약(이름)은 스케쥴에 그대로 남아있습니다.\n- 이 사람은 나중에 다시 로그인하여 재가입할 수 있습니다.`)) return;
          try {
            await deleteDoc(doc(db, "users", m.uid));
            // 회원 수 카운터 감소
            try {
              const counterRef = doc(db, "meta", "counters");
              const counterSnap = await getDoc(counterRef);
              const currentCount = counterSnap.exists() ? (counterSnap.data().memberCount || 0) : 0;
              await setDoc(counterRef, {
                memberCount: Math.max(0, currentCount - 1)
              }, { merge: true });
            } catch (cErr) {
              console.warn("counter update failed", cErr);
            }
            showToast("탈퇴 처리되었습니다");
            await renderMembersList();
          } catch (err) {
            console.error(err);
            alert("탈퇴 처리 중 오류가 발생했습니다.");
          }
        });
        row.appendChild(delBtn);
      }

      wrap.appendChild(row);
    });

    body.innerHTML = "";
    body.appendChild(wrap);
  } catch (err) {
    console.error(err);
    body.innerHTML = `<div class="members-empty">불러오기 실패</div>`;
  }
}
